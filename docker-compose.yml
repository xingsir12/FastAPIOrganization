services:
  db:
    image: postgres:18
    container_name: organization_db
    environment:
      POSTGRES_DB: organization_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d organization_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
  app:
    build: .
    container_name: fastapi_organization
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/organization_db
      - DEBUG=True
      - UVICORN_RELOAD=false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: 